<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rudi Rocha – Pastor</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=Playfair+Display:wght@700&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #141414;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  font-family: 'Montserrat', sans-serif;
  padding: 20px;
}
.card {
  width: 400px;
  background: #111;
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 40px 80px rgba(0,0,0,0.7), 0 0 0 1px rgba(232,160,0,0.15);
  position: relative;
}
.card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, #c0392b, #e8a000, #c0392b);
  z-index: 10;
}
.header {
  padding: 36px 32px 28px;
  display: flex;
  align-items: center;
  gap: 24px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
  position: relative;
}
.header::after {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at top left, rgba(192,57,43,0.1) 0%, transparent 65%);
  pointer-events: none;
}
.logo-wrap {
  width: 80px;
  height: 80px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}
.logo-wrap img {
  width: 80px;
  height: 80px;
  object-fit: contain;
  mix-blend-mode: screen;
}
.church-label {
  font-size: 8px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: #e8a000;
  font-weight: 500;
  margin-bottom: 8px;
}
.person-name {
  font-family: 'Playfair Display', serif;
  font-size: 30px;
  color: #fff;
  font-weight: 700;
  line-height: 1;
  margin-bottom: 8px;
}
.person-role {
  font-size: 8px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: #c0392b;
  font-weight: 600;
  border-top: 1px solid rgba(192,57,43,0.4);
  padding-top: 6px;
}
.contacts {
  padding: 24px 32px;
  display: flex;
  flex-direction: column;
  gap: 14px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}
.contact-item {
  display: flex;
  align-items: center;
  gap: 14px;
  text-decoration: none;
  color: inherit;
  transition: opacity 0.2s;
}
.contact-item:hover { opacity: 0.7; }
.contact-icon {
  width: 36px;
  height: 36px;
  border-radius: 10px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.contact-icon svg { width: 15px; height: 15px; }
.contact-label {
  font-size: 8px;
  color: #555;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  margin-bottom: 2px;
}
.contact-value {
  font-size: 12px;
  color: #e0e0e0;
  font-weight: 400;
}
.social-section { padding: 20px 32px 28px; }
.social-heading {
  font-size: 8px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: #555;
  margin-bottom: 14px;
}
.social-grid { display: flex; gap: 10px; }
.social-btn {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 7px;
  padding: 12px 6px;
  border-radius: 12px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.07);
  text-decoration: none;
  transition: background 0.2s, transform 0.15s;
  cursor: pointer;
}
.social-btn:hover {
  background: rgba(255,255,255,0.09);
  transform: translateY(-2px);
}
.social-btn svg { width: 22px; height: 22px; }
.social-btn span {
  font-size: 7px;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: #888;
  font-weight: 500;
}
.footer {
  padding: 14px 32px;
  border-top: 1px solid rgba(255,255,255,0.05);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}
.footer-dot { width: 4px; height: 4px; border-radius: 50%; background: #e8a000; opacity: 0.5; }
.footer-text { font-size: 7px; color: #444; letter-spacing: 2px; text-transform: uppercase; }
</style>
</head>
